# ============================================================================
# CD Pipeline – Azure AI Landing Zone (Bicep)
# ============================================================================
# Multi-stage deployment: DEV → TEST → PROD with manual approval gates.
# Each stage uses the reusable deploy-bicep template.
#
# This pipeline triggers only after the CI pipeline succeeds, and downloads
# the CI-validated artifact instead of rebuilding from source.
# ============================================================================
#
# PREREQUISITES
# ─────────────
# 1. Create an ARM Service Connection named "azure-ailz-service-connection"
#    (or update pipelines/azuredevops/templates/variables.yml with your connection name).
#    The service principal needs Contributor + User Access Administrator on
#    the target subscription.
#
# 2. Create Azure DevOps Environments: "dev", "test", "prod".
#    Add manual approval checks on "test" and "prod" environments.
#
# 3. Create a Variable Group "ailz-secrets" containing:
#      - secretOrRandomPassword  (secret)
#    Link it to this pipeline.
#
# 4. The CI pipeline ("AI Landing Zone - CI") must exist and be named exactly
#    as referenced in the resources section below, or update the pipeline name.
# ============================================================================

name: 'CD-AILandingZone-$(Date:yyyyMMdd).$(Rev:r)'

# ── No direct trigger — CD runs only after CI succeeds ─────────────────────
trigger: none
pr: none

# ── CI pipeline dependency ─────────────────────────────────────────────────
resources:
  pipelines:
    - pipeline: ci
      source: 'AI Landing Zone - CI'
      # No automatic trigger — CD runs on demand and lets the user pick DEV/TEST/PROD.

variables:
  - template: templates/variables.yml
  - group: ailz-secrets           # Variable group with secretOrRandomPassword

# ── Parameters for manual runs ─────────────────────────────────────────────
# Each environment is independent: turn on only the ones you want.
# Preview → Deploy runs within the selected environment.
parameters:
  - name: deployDev
    displayName: 'Deploy to DEV'
    type: boolean
    default: false
  - name: deployTest
    displayName: 'Deploy to TEST'
    type: boolean
    default: false
  - name: deployProd
    displayName: 'Deploy to PROD'
    type: boolean
    default: false

stages:
  # ────────────────────────────────────────────────────────────────────────
  # Stage 1: Download CI-validated artifact
  # ────────────────────────────────────────────────────────────────────────
  - stage: Build
    displayName: 'Download CI Artifact'
    jobs:
      - job: DownloadArtifact
        displayName: 'Download Bicep templates from CI'
        pool:
          vmImage: $(agentPool)
        timeoutInMinutes: 5
        steps:
          - download: ci
            artifact: 'bicep-templates'
            displayName: 'Download artifact from CI pipeline'

          - task: PublishPipelineArtifact@1
            displayName: 'Re-publish for CD traceability'
            inputs:
              targetPath: '$(Pipeline.Workspace)/ci/bicep-templates'
              artifact: 'bicep-templates'
              publishLocation: 'pipeline'

  # ────────────────────────────────────────────────────────────────────────
  # Deployment stages — sequential promotion: Dev → Test → Prod.
  #
  # Gating model:
  #   • Each `deploy<Env>` boolean (defaults to false) is an opt-in switch
  #     at queue time. Turn on only the envs you want to promote to.
  #   • Stage dependencies enforce ordering:
  #       Dev.dependsOn  = Build
  #       Test.dependsOn = Dev
  #       Prod.dependsOn = Test
  #   • If a selected env fails, later envs are skipped automatically
  #     (default stage condition is `succeeded()`).
  #   • If you select Test only (not Dev), Test still runs — `succeeded()`
  #     treats a skipped parent stage as non-blocking. For strict promotion
  #     (Test requires Dev to have actually succeeded), change the
  #     condition to:
  #       and(succeeded('Dev'), eq('${{ parameters.deployTest }}', 'true'))
  #
  # APPROVAL GATES (configured OUTSIDE YAML):
  #   Approvals live on the Azure DevOps **Environment** resource, not in
  #   the pipeline YAML. For each env (`dev`, `test`, `prod`) referenced
  #   via `environment:` in templates/deploy-bicep.yml:
  #     1. Pipelines → Environments → select the environment.
  #     2. More actions (…) → Approvals and checks → + → Approvals.
  #     3. Add required approvers and instructions.
  #   Recommended: no approval on `dev`, required approval on `test` and
  #   `prod`. The pipeline pauses before the corresponding stage until
  #   the approval is granted.
  # ────────────────────────────────────────────────────────────────────────
  - stage: Dev
    displayName: 'DEV'
    dependsOn: Build
    condition: and(succeeded(), eq('${{ parameters.deployDev }}', 'true'))
    jobs:
      - template: templates/deploy-bicep.yml
        parameters:
          azureServiceConnection: $(azureServiceConnectionDev)
          location: $(location)
          environmentName: dev
          azdEnvironmentName: $(environmentName)-dev

  - stage: Test
    displayName: 'TEST'
    dependsOn: Dev
    condition: and(not(failed()), eq('${{ parameters.deployTest }}', 'true'))
    jobs:
      - template: templates/deploy-bicep.yml
        parameters:
          azureServiceConnection: $(azureServiceConnectionTest)
          location: $(location)
          environmentName: test
          azdEnvironmentName: $(environmentName)-test

  - stage: Prod
    displayName: 'PROD'
    dependsOn: Test
    condition: and(not(failed()), eq('${{ parameters.deployProd }}', 'true'))
    jobs:
      - template: templates/deploy-bicep.yml
        parameters:
          azureServiceConnection: $(azureServiceConnectionProd)
          location: $(location)
          environmentName: prod
          azdEnvironmentName: $(environmentName)-prod
