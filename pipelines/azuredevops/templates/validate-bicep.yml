# ---------------------------------------------------------------------------
# Reusable job template – Validate Bicep syntax and publish artifact
# ---------------------------------------------------------------------------
# Local validation only: compile + lint, then publish the repo as an
# artifact for the CD pipeline to consume. No Azure authentication or
# provisioning is performed here.
# ---------------------------------------------------------------------------

jobs:
  - job: Validate
    displayName: 'Validate Bicep syntax and publish artifact'
    pool:
      vmImage: $(agentPool)
    timeoutInMinutes: 15
    steps:
      - checkout: self
        fetchDepth: 1
        displayName: 'Checkout source (shallow)'

      - task: Bash@3
        displayName: 'Install Bicep CLI'
        inputs:
          targetType: 'inline'
          script: |
            echo "##[group]Installing Bicep CLI"
            az bicep install
            az bicep version
            echo "##[endgroup]"

      - task: Bash@3
        displayName: 'Bicep build (compile to ARM)'
        inputs:
          targetType: 'inline'
          workingDirectory: '$(Build.SourcesDirectory)'
          script: |
            echo "##[group]Compiling Bicep template"
            az bicep build --file $(templateFile) --stdout > /dev/null
            echo "##[endgroup]"
            echo "✅ Bicep compilation succeeded"

      - task: Bash@3
        displayName: 'Bicep lint'
        inputs:
          targetType: 'inline'
          workingDirectory: '$(Build.SourcesDirectory)'
          script: |
            echo "##[group]Linting Bicep template"
            az bicep lint --file $(templateFile)
            echo "##[endgroup]"
            echo "✅ Bicep linting passed"

      - task: PublishPipelineArtifact@1
        displayName: 'Publish Bicep templates'
        inputs:
          targetPath: '$(Build.SourcesDirectory)'
          artifact: 'bicep-templates'
          publishLocation: 'pipeline'
