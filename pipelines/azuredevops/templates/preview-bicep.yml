# ---------------------------------------------------------------------------
# Reusable job template – azd provision --preview (what-if) against a target
# ---------------------------------------------------------------------------
# Runs `azd provision --preview` to produce a what-if against the resolved
# subscription and principal. Used before each deploy stage in CD.
#
# Parameters:
#   azureServiceConnection - Name of the ARM service connection
#   location               - Azure region (e.g., eastus2)
#   azdEnvironmentName     - AZD environment name (e.g., ailz-v8-dev)
# ---------------------------------------------------------------------------
parameters:
  - name: azureServiceConnection
    type: string
  - name: location
    type: string
  - name: azdEnvironmentName
    type: string

jobs:
  - job: Preview
    displayName: 'azd provision --preview'
    pool:
      vmImage: $(agentPool)
    timeoutInMinutes: 30
    steps:
      - checkout: self
        fetchDepth: 1
        displayName: 'Checkout source (shallow)'

      - task: AzureCLI@2
        displayName: 'Install azd and Bicep CLI'
        inputs:
          azureSubscription: ${{ parameters.azureServiceConnection }}
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            echo "##[group]Installing Azure Developer CLI"
            curl -fsSL https://aka.ms/install-azd.sh | bash
            azd version
            echo "##[endgroup]"
            echo "##[group]Installing Bicep CLI"
            az bicep install
            az bicep version
            echo "##[endgroup]"

      - task: AzureCLI@2
        displayName: 'Run azd provision --preview (what-if)'
        inputs:
          azureSubscription: ${{ parameters.azureServiceConnection }}
          scriptType: bash
          scriptLocation: inlineScript
          addSpnToEnvironment: true
          inlineScript: |
            set -e

            echo "##[group]Initializing azd environment"
            azd config set auth.useAzCliAuth true
            azd env new ${{ parameters.azdEnvironmentName }} --no-prompt
            azd env set AZURE_LOCATION ${{ parameters.location }}
            azd env set AZURE_SUBSCRIPTION_ID $(az account show --query id -o tsv)
            azd env set AZURE_RESOURCE_GROUP "rg-${{ parameters.azdEnvironmentName }}"

            # Resolve the Entra object ID used for executor role assignments.
            PRINCIPAL_ID="${AZURE_PRINCIPAL_ID:-}"
            PRINCIPAL_TYPE="${AZURE_PRINCIPAL_TYPE:-}"

            if [ -z "$PRINCIPAL_ID" ] || [ "$PRINCIPAL_ID" = "null" ]; then
              if [ -n "$servicePrincipalId" ]; then
                PRINCIPAL_ID=$(az ad sp show --id "$servicePrincipalId" --query id -o tsv 2>/dev/null || true)
                PRINCIPAL_TYPE="${PRINCIPAL_TYPE:-ServicePrincipal}"
              else
                PRINCIPAL_ID=$(az ad signed-in-user show --query id -o tsv 2>/dev/null || true)
                PRINCIPAL_TYPE="${PRINCIPAL_TYPE:-User}"
              fi
            fi

            if [ -z "$PRINCIPAL_ID" ] || [ "$PRINCIPAL_ID" = "null" ]; then
              echo "##[error]Unable to resolve the deployment principal object ID. Set AZURE_PRINCIPAL_ID to the Entra object ID of the deploying identity."
              exit 1
            fi

            azd env set AZURE_PRINCIPAL_ID "$PRINCIPAL_ID"
            azd env set AZURE_PRINCIPAL_TYPE "${PRINCIPAL_TYPE:-ServicePrincipal}"
            echo "Using principal ID: $PRINCIPAL_ID"
            echo "##[endgroup]"

            echo "##[group]Running azd provision --preview"
            azd provision --preview --no-prompt
            echo "##[endgroup]"
            echo "✅ What-If preview complete"
