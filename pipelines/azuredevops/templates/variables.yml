# ---------------------------------------------------------------------------
# Shared pipeline variables for AI Landing Zone Bicep deployments
# ---------------------------------------------------------------------------
# Update the values below to match your Azure environment.
# Secrets (e.g., secretOrRandomPassword) must be stored in an Azure DevOps
# Variable Group named "ailz-secrets" linked to your pipelines.
# ---------------------------------------------------------------------------

variables:
  # ── Azure connection ────────────────────────────────────────────────────
  # Name of the Azure Resource Manager service connection configured
  # in Project Settings > Service connections. Must have Contributor +
  # User Access Administrator roles on the target subscription.
  azureServiceConnectionDev: 'azure-ailz-service-connection-alican'
  azureServiceConnectionTest: 'azure-ailz-service-connection-busra'
  azureServiceConnectionProd: 'azure-ailz-service-connection-shaurabh28650'

  # ── Azure region ────────────────────────────────────────────────────────
  # Azure region where resources will be deployed.
  # Must support all services in the template (AI Foundry, Container Apps, etc.).
  location: 'francecentral'

  # ── Bicep / template paths ─────────────────────────────────────────────
  # Relative path to the Bicep entry point (used for lint/build steps).
  templateFile: 'main.bicep'

  # ── AZD environment ────────────────────────────────────────────────────
  # Azure Developer CLI environment name. Used as the 'environmentName'
  # Bicep parameter and to generate deterministic resource names.
  # azd handles resource group creation, parameter filtering, and
  # principal ID resolution automatically.
  environmentName: 'ailz-bicep-v212'

  # ── Deployment mode ─────────────────────────────────────────────────────
  # Controls whether to deploy with network isolation (Zero Trust) or not.
  # Set to 'basic' for public networking (faster, for dev/demo).
  # Set to 'zeroTrust' for network isolation (VNet, private endpoints, Bastion).
  # This is the persistent default — can be overridden per-run via the
  # 'Deployment Mode' parameter when manually triggering the CD pipeline.
  deploymentMode: 'zeroTrust'

  # ── Agent pool ──────────────────────────────────────────────────────────
  # The agent pool used to run pipeline jobs.
  # For Microsoft-hosted agents, use 'ubuntu-latest' (default).
  # For self-hosted agents, set this to your agent pool name (e.g., 'my-pool')
  # and update vmImage references in pipeline YAML to use 'pool: name' syntax.
  agentPool: 'ubuntu-latest'

  # ── Deploy retries ────────────────────────────────────────────────────
  # Number of retries for `azd provision` after the first failure.
  #   0 = run once, no retries (disables the mechanism)
  #   N = up to N additional attempts after the initial one
  deployRetryCount: 0
