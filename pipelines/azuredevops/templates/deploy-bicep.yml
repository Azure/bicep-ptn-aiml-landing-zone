# ---------------------------------------------------------------------------
# Reusable job template – Deploy Bicep to a target environment using azd
# ---------------------------------------------------------------------------
# Uses Azure Developer CLI (azd) for provisioning, which correctly handles
# parameter filtering, resource group creation, and principal ID resolution.
#
# Parameters:
#   azureServiceConnection - Name of the ARM service connection
#   location               - Azure region (e.g., eastus2)
#   environmentName        - Azure DevOps environment name (e.g., dev, test, prod)
#   azdEnvironmentName     - AZD environment name (e.g., ailz-dev, ailz-test)
#   additionalEnvVars      - (Optional) Extra azd env vars as 'KEY=VALUE KEY2=VALUE2'
# ---------------------------------------------------------------------------
parameters:
  - name: azureServiceConnection
    type: string
  - name: location
    type: string
  - name: environmentName
    type: string
  - name: azdEnvironmentName
    type: string
  - name: additionalEnvVars
    type: string
    default: ''
  - name: dependsOn
    type: object
    default: []

jobs:
  - deployment: Deploy
    displayName: 'Deploy AI Landing Zone'
    dependsOn: ${{ parameters.dependsOn }}
    pool:
      vmImage: $(agentPool)
    timeoutInMinutes: 120
    environment: ${{ parameters.environmentName }}
    strategy:
      runOnce:
        deploy:
          steps:
            # ── Checkout source ─────────────────────────────────────────
            - checkout: self
              fetchDepth: 1
              displayName: 'Checkout source (shallow)'

            # ── Install azd + Bicep CLI ─────────────────────────────────
            - task: AzureCLI@2
              displayName: 'Install azd and Bicep CLI'
              inputs:
                azureSubscription: ${{ parameters.azureServiceConnection }}
                scriptType: bash
                scriptLocation: inlineScript
                inlineScript: |
                  echo "##[group]Installing Azure Developer CLI"
                  curl -fsSL https://aka.ms/install-azd.sh | bash
                  azd version
                  echo "##[endgroup]"
                  echo "##[group]Installing Bicep CLI"
                  az bicep install
                  az bicep version
                  echo "##[endgroup]"

            # ── Provision with azd ──────────────────────────────────────
            # Retry loop around `azd provision` so transient Azure failures
            # (AccountProvisioningStateInvalid, Conflict, etc.) get another
            # chance without failing the pipeline. Retry count is controlled
            # by the `deployRetryCount` variable in templates/variables.yml.
            - task: AzureCLI@2
              displayName: 'Provision infrastructure (azd provision)'
              inputs:
                azureSubscription: ${{ parameters.azureServiceConnection }}
                scriptType: bash
                scriptLocation: inlineScript
                addSpnToEnvironment: true
                arguments: $(secretOrRandomPassword)
                inlineScript: |
                  echo "##[group]Initializing azd environment"
                  azd config set auth.useAzCliAuth true
                  azd env new ${{ parameters.azdEnvironmentName }} --no-prompt
                  azd env set AZURE_LOCATION ${{ parameters.location }}
                  azd env set AZURE_SUBSCRIPTION_ID $(az account show --query id -o tsv)
                  azd env set AZURE_RESOURCE_GROUP "rg-${{ parameters.azdEnvironmentName }}"

                  # Resolve the Entra object ID used for executor role assignments.
                  PRINCIPAL_ID="${AZURE_PRINCIPAL_ID:-}"
                  PRINCIPAL_TYPE="${AZURE_PRINCIPAL_TYPE:-}"

                  if [ -z "$PRINCIPAL_ID" ] || [ "$PRINCIPAL_ID" = "null" ]; then
                    if [ -n "$servicePrincipalId" ]; then
                      PRINCIPAL_ID=$(az ad sp show --id "$servicePrincipalId" --query id -o tsv 2>/dev/null || true)
                      PRINCIPAL_TYPE="${PRINCIPAL_TYPE:-ServicePrincipal}"
                    else
                      PRINCIPAL_ID=$(az ad signed-in-user show --query id -o tsv 2>/dev/null || true)
                      PRINCIPAL_TYPE="${PRINCIPAL_TYPE:-User}"
                    fi
                  fi

                  if [ -z "$PRINCIPAL_ID" ] || [ "$PRINCIPAL_ID" = "null" ]; then
                    echo "##[error]Unable to resolve the deployment principal object ID. Set the AZURE_PRINCIPAL_ID pipeline variable to the Entra object ID of the deploying identity."
                    exit 1
                  fi

                  azd env set AZURE_PRINCIPAL_ID "$PRINCIPAL_ID"
                  azd env set AZURE_PRINCIPAL_TYPE "${PRINCIPAL_TYPE:-ServicePrincipal}"
                  echo "Using principal ID: $PRINCIPAL_ID"

                  # Bridge VM admin password into azd env (passed via scriptArguments)
                  if [ -z "$1" ]; then
                    echo "##[error]Variable 'secretOrRandomPassword' is not set. Ensure the 'ailz-secrets' variable group is linked to this pipeline with a 'secretOrRandomPassword' secret variable."
                    exit 1
                  fi
                  azd env set secretOrRandomPassword "$1"

                  # Set network isolation based on deployment mode from variables.yml
                  DEPLOY_MODE="$(deploymentMode)"
                  if [ "$DEPLOY_MODE" = "zeroTrust" ]; then
                    azd env set NETWORK_ISOLATION true
                    echo "Deployment mode: Zero Trust (network isolation enabled)"
                  else
                    azd env set NETWORK_ISOLATION false
                    echo "Deployment mode: Basic (public networking)"
                  fi

                  # Set additional environment variables if provided
                  ADDITIONAL_VARS="${{ parameters.additionalEnvVars }}"
                  if [ -n "$ADDITIONAL_VARS" ]; then
                    for VAR in $ADDITIONAL_VARS; do
                      KEY="${VAR%%=*}"
                      VALUE="${VAR#*=}"
                      azd env set "$KEY" "$VALUE"
                      echo "Set: $KEY=$VALUE"
                    done
                  fi
                  echo "##[endgroup]"

                  echo "##[group]Running azd provision"
                  RETRY_COUNT="$(deployRetryCount)"
                  if ! [[ "$RETRY_COUNT" =~ ^[0-9]+$ ]]; then RETRY_COUNT=0; fi
                  MAX_ATTEMPTS=$((RETRY_COUNT + 1))
                  echo "Plan: 1 initial attempt + up to $RETRY_COUNT retr$([ "$RETRY_COUNT" -eq 1 ] && echo y || echo ies) on transient Azure failures ($MAX_ATTEMPTS total)."

                  AZD_EXIT=1
                  ATTEMPT=1
                  while [ "$ATTEMPT" -le "$MAX_ATTEMPTS" ]; do
                    if [ "$ATTEMPT" -eq 1 ]; then
                      echo "##[section]Initial attempt"
                    else
                      echo "##[section]Retry $((ATTEMPT - 1)) of $RETRY_COUNT"
                    fi

                    set +e
                    azd provision --no-prompt 2>&1 | tee /tmp/azd_output.log
                    AZD_EXIT=${PIPESTATUS[0]}
                    set -e

                    # Success iff exit=0 AND no resource-level failures in the log.
                    if [ "$AZD_EXIT" -eq 0 ] && ! grep -qi "UnmatchedPrincipalType\|DeploymentFailed\|ResourceDeploymentFailure\|ERROR:\|deployment failed\|(x) Failed" /tmp/azd_output.log; then
                      if [ "$ATTEMPT" -gt 1 ]; then
                        echo "Succeeded on retry $((ATTEMPT - 1)) of $RETRY_COUNT."
                      fi
                      break
                    fi

                    if [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; then
                      if [ "$ATTEMPT" -eq 1 ]; then
                        echo "##[warning]Initial attempt failed. Retrying (1 of $RETRY_COUNT)..."
                      else
                        echo "##[warning]Retry $((ATTEMPT - 1)) of $RETRY_COUNT failed. Retrying ($ATTEMPT of $RETRY_COUNT)..."
                      fi
                    fi
                    ATTEMPT=$((ATTEMPT + 1))
                  done
                  echo "##[endgroup]"

                  # ── Extract and surface detailed errors ───────────────
                  extract_errors() {
                    local logfile="$1"
                    local summary=""

                    # Collect all error lines into a temp file for dedup
                    {
                      # azd ERROR: lines
                      grep -i "^ERROR:" "$logfile"
                      # ARM HTTP error responses (e.g., RESPONSE 409: 409 Conflict)
                      grep -iE "^RESPONSE [0-9]+:" "$logfile"
                      # ARM error codes (e.g., ERROR CODE: InvalidResourceGroupLocation)
                      grep -iE "^ERROR CODE:" "$logfile"
                      # azd deployment failure lines
                      grep -iE "^deployment failed:" "$logfile"
                      # ARM deployment error details (e.g., AccountProvisioningStateInvalid: ...)
                      grep -iE "^Deployment Error Details:" "$logfile"
                      # Resource-specific error codes from ARM (e.g., AccountProvisioningStateInvalid: Call to ...)
                      grep -E "^[A-Za-z]+:" "$logfile" | grep -ivE "^(Provisioning|Downloading|Retrieving|Initialize|Done|Set|Using|echo|curl|az |azd )" | grep -i "fail\|invalid\|error\|conflict"
                      # Failed resource lines from azd output (e.g., (x) Failed: ...)
                      grep -E "^\(x\) Failed:" "$logfile"
                      # Suggestion lines
                      grep -iE "^Suggestion:" "$logfile"
                      # JSON error message blocks
                      grep -oP '"message":\s*"[^"]*"' "$logfile" | sed 's/"message":\s*"//;s/"$//'
                    } | sort -u | while IFS= read -r line; do
                      echo "##[error]$line"
                    done

                    # Build a one-line summary from the most specific error
                    summary=$(grep -iE "^ERROR:|^Deployment Error Details:|^\(x\) Failed:" "$logfile" | head -1)
                    if [ -z "$summary" ]; then
                      summary=$(grep -iE "deployment failed:|fail|invalid|conflict" "$logfile" | head -1)
                    fi
                    if [ -n "$summary" ]; then
                      # Set custom task result message (replaces "Script failed with exit code: 1")
                      echo "##vso[task.complete result=Failed;]$summary"
                    fi
                  }

                  # Check for deployment errors in output even if azd exits with 0
                  if grep -qi "UnmatchedPrincipalType\|DeploymentFailed\|ResourceDeploymentFailure\|ERROR:\|deployment failed\|(x) Failed" /tmp/azd_output.log; then
                    echo "##[error]Deployment completed with errors. See error details below."
                    echo "##[warning]Detected resource-level failures despite overall deployment success."
                    extract_errors /tmp/azd_output.log
                    exit 1
                  fi

                  if [ $AZD_EXIT -ne 0 ]; then
                    echo "##[error]azd provision failed. See error details below."
                    extract_errors /tmp/azd_output.log
                    exit $AZD_EXIT
                  fi

                  echo "✅ Deployment completed successfully"
