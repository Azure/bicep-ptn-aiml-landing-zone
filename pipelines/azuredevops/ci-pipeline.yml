# ============================================================================
# CI Pipeline – Azure AI Landing Zone (Bicep)
# ============================================================================
# Triggers on pull requests and pushes to main.
# Validates Bicep templates: compile → lint.
# Environment-specific validation (what-if) is done in the CD pipeline.
# ============================================================================

name: 'CI-AILandingZone-$(Date:yyyyMMdd).$(Rev:r)'

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - '*.bicep'
      - '*.json'
      - 'modules/**'
      - 'constants/**'
      - 'pipelines/azuredevops/**'
    exclude:
      - '*.md'
      - 'media/**'
      - 'LICENSE'

pr:
  branches:
    include:
      - main
  paths:
    include:
      - '*.bicep'
      - '*.json'
      - 'modules/**'
      - 'constants/**'
      - 'pipelines/azuredevops/**'
    exclude:
      - '*.md'
      - 'media/**'
      - 'LICENSE'

variables:
  - template: templates/variables.yml

stages:
  - stage: Validate
    displayName: 'Validate Bicep (build, lint, publish)'
    jobs:
      - template: templates/validate-bicep.yml
